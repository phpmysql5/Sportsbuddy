name: Monorepo CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/sports-buddy-api/**'
      - 'mobile/sports_buddy_app/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/sports-buddy-api/**'
      - 'mobile/sports_buddy_app/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sportsbuddy
          POSTGRES_PASSWORD: sportsbuddy
          POSTGRES_DB: sportsbuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sportsbuddy -d sportsbuddy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://sportsbuddy:sportsbuddy@localhost:5432/sportsbuddy?schema=public
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
    defaults:
      run:
        working-directory: backend/sports-buddy-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/sports-buddy-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma db push
        run: npm run prisma:db:push

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/sports_buddy_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test
