services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sportsbuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportsbuddy
      POSTGRES_PASSWORD: sportsbuddy
      POSTGRES_DB: sportsbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sportsbuddy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
